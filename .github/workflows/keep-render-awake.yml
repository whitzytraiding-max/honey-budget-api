name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production health endpoint
        run: |
          curl --fail --silent --show-error \
            --max-time 20 \
            https://honey-budget-api.onrender.com/health
